{% extends "base.html" %}

{% block auth_content %}
<style>
    .auth-container { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .reset-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-radius: 32px; }
</style>
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="reset-card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fas fa-lock-open fa-3x text-primary mb-3"></i>
                <h2 class="fw-bold">Set New PIN</h2>
                <p class="text-muted">Choose a new 4‑digit PIN.</p>
            </div>
            <form method="post">
                <div class="mb-4">
                    <label class="form-label fw-semibold">New PIN</label>
                    <input type="password" name="new_pin" class="form-control form-control-lg" maxlength="4" pattern="\d{4}" inputmode="numeric" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm PIN</label>
                    <input type="password" name="confirm_pin" class="form-control form-control-lg" maxlength="4" pattern="\d{4}" inputmode="numeric" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill">Update PIN</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('home') }}" class="text-decoration-none">Back to Login</a>
            </div>
        </div>
    </div>
</div>
<script>
    // Optional: show/hide PIN fields
    // (You can add a toggle similar to login page)
</script>
{% endblock %}
