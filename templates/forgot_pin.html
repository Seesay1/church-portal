{% extends "base.html" %}

{% block auth_content %}
<style>
    /* Reuse same login styles or define minimal */
    .auth-container { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .reset-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
</style>
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="reset-card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fas fa-key fa-3x text-primary mb-3"></i>
                <h2 class="fw-bold">Forgot PIN?</h2>
                <p class="text-muted">Enter your Member ID to reset.</p>
            </div>
            <form method="post">
                <div class="form-floating mb-4">
                    <input type="text" class="form-control" id="member_id" name="member_id" placeholder="PCG-XXXX" required>
                    <label for="member_id">Member ID</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill">Continue</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('home') }}" class="text-decoration-none">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
