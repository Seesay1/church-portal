{% extends "base.html" %}

{% block page_title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}" class="text-decoration-none">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('blog_list') }}" class="text-decoration-none">Announcements</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ post.title }}</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-5">
            <h1 class="display-5 fw-bold mb-3">{{ post.title }}</h1>
            <div class="d-flex flex-wrap gap-3 mb-4 text-muted small">
                <span><i class="fas fa-user me-1"></i>{{ post.author }}</span>
                <span><i class="fas fa-tag me-1"></i>{{ post.category }}</span>
                <span><i class="far fa-calendar me-1"></i>{{ post.published[:10] }}</span>
            </div>
            <hr class="my-4">
            <div class="content fs-5 lh-lg" style="white-space: pre-line;">
                {{ post.content }}
            </div>
            <div class="mt-5 text-end">
                <a href="{{ url_for('blog_list') }}" class="btn btn-outline-primary rounded-pill px-5">
                    <i class="fas fa-arrow-left me-2"></i>Back to Blog
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
